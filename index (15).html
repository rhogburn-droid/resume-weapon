function extractText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res({name:file.name,content:ev.target.result,type:file.type});r.onerror=()=>rej();r.readAsText(file)})}

function extractDocx(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{mammoth.extractRawText({arrayBuffer:ev.target.result}).then(result=>{res({name:file.name,content:result.value,type:file.type})}).catch(()=>rej(new Error("DOCX parse failed")))};r.onerror=()=>rej();r.readAsArrayBuffer(file)})}

// --- Resume Style Renderers (return HTML strings for export) ---
function parseResume(text){
  const sections=[];let current=null;
  text.split("\n").forEach(l=>{
    if(l.startsWith("# ")){sections.push({type:"name",text:l.slice(2)});current=null}
    else if(l.startsWith("## ")){current={type:"section",title:l.slice(3),items:[]};sections.push(current)}
    else if(l.startsWith("### ")){if(current)current.items.push({type:"subtitle",text:l.slice(4)});else sections.push({type:"subtitle",text:l.slice(4)})}
    else if(l.startsWith("- ")||l.startsWith("* ")){if(current)current.items.push({type:"bullet",text:l.slice(2)});else sections.push({type:"bullet",text:l.slice(2)})}
    else if(l.startsWith("**")&&l.endsWith("**")){if(current)current.items.push({type:"bold",text:l.replace(/\*\*/g,"")});else sections.push({type:"bold",text:l.replace(/\*\*/g,"")})}
    else if(l.trim()){if(current)current.items.push({type:"text",text:l.replace(/\*\*/g,"")});else sections.push({type:"text",text:l.replace(/\*\*/g,"")})}
  });
  return sections;
}

  });
  h+='</div>';return h;
}

  // ATS Analysis — client-side keyword extraction and scoring
  function analyzeATS(resumeText,jobText){
    const normalize=t=>t.toLowerCase().replace(/[^a-z0-9\s\-\/\+\#\.]/g," ").replace(/\s+/g," ").trim();
    const resumeN=normalize(resumeText);
    const jobN=normalize(jobText);
    // Common stop words to ignore
    const stops=new Set(["the","and","for","are","but","not","you","all","any","can","had","her","was","one","our","out","has","its","let","say","she","too","use","way","who","did","get","got","him","his","how","its","may","new","now","old","see","two","also","back","been","call","came","come","each","find","from","give","good","have","help","here","high","just","keep","know","last","long","look","made","make","many","more","most","much","must","name","need","next","only","open","over","part","plan","same","some","such","sure","take","tell","than","that","them","then","they","this","time","very","want","well","went","what","when","will","with","work","year","your","about","after","being","below","could","every","first","found","great","house","large","later","never","often","other","place","point","right","shall","since","small","state","still","their","there","these","thing","think","those","three","under","until","using","where","which","while","world","would","above","along","might","should","before","between","during","through","within","without","across","against","around","because","become","before","beyond","during","either","enough","indeed","inside","likely","nearly","rather","really","simply","toward","unless","unlike"]);
    // Extract meaningful phrases and keywords from job posting
    const extractKeywords=(text)=>{
      const words=text.split(/\s+/).filter(w=>w.length>2&&!stops.has(w));
      const phrases=new Set();
      // Single important words
      words.forEach(w=>{if(w.length>3)phrases.add(w)});
      // 2-word and 3-word phrases
      const wArr=text.split(/\s+/);
      for(let i=0;i<wArr.length-1;i++){
        const p2=wArr[i]+" "+wArr[i+1];
        if(p2.length>5&&!stops.has(wArr[i])&&!stops.has(wArr[i+1]))phrases.add(p2);
        if(i<wArr.length-2){const p3=p2+" "+wArr[i+2];if(p3.length>8)phrases.add(p3)}
      }
      return phrases;
    };
    // Focus on skill-like and requirement-like keywords
    const skillPatterns=/(?:experience|proficiency|knowledge|skills?|expertise|ability|competenc|familiar|understanding|background)\s+(?:in|with|of)\s+([^.,;]+)/gi;
    const reqPatterns=/(?:required|preferred|desired|must have|should have|minimum|qualifications?)[:\s]+([^.]+)/gi;
    const toolPatterns=/\b(salesforce|hubspot|excel|python|java|sql|aws|azure|gcp|tableau|power bi|jira|slack|sap|oracle|workday|figma|sketch|react|node|docker|kubernetes|git|agile|scrum|meddic|meddpicc|six sigma|lean|pmp|cpa|cfa|hipaa|ferpa|gdpr|saas|b2b|b2c|crm|erp|api|ai|ml|nlp|roi|kpi|okr|p&l|arr|mrr|nrr|ltv|cac)\b/gi;
    const yearPatterns=/(\d+)\+?\s*years?/gi;
    const degreePatterns=/\b(bachelor|master|mba|phd|doctorate|bs|ba|ms|ma|b\.s|m\.s|m\.b\.a)\b/gi;
    
    // Extract from job
    const jobKeywords=new Set();
    let m;
    // Tools and tech
    while((m=toolPatterns.exec(jobN))!==null)jobKeywords.add(m[1].toLowerCase());
    toolPatterns.lastIndex=0;
    // Skill phrases
    while((m=skillPatterns.exec(jobN))!==null){m[1].trim().split(/,|and/).forEach(s=>{const t=s.trim();if(t.length>3)jobKeywords.add(t)})}
    // Year requirements
    while((m=yearPatterns.exec(jobN))!==null)jobKeywords.add(m[0]);
    // Degrees
    while((m=degreePatterns.exec(jobN))!==null)jobKeywords.add(m[1].toLowerCase());
    // Important nouns from job (filter aggressively)
    const jobWords=jobN.split(/\s+/).filter(w=>w.length>4&&!stops.has(w));
    const wordFreq={};
    jobWords.forEach(w=>{wordFreq[w]=(wordFreq[w]||0)+1});
    Object.entries(wordFreq).filter(([w,c])=>c>=2).forEach(([w])=>jobKeywords.add(w));
    // 2-word job phrases that appear important
    const jArr=jobN.split(/\s+/);
    for(let i=0;i<jArr.length-1;i++){
      const p=jArr[i]+" "+jArr[i+1];
      if(p.length>8&&!stops.has(jArr[i])&&!stops.has(jArr[i+1])){
        const freq=jobN.split(p).length-1;
        if(freq>=2)jobKeywords.add(p);
      }
    }
    // Remove very generic terms
    const generic=new Set(["position","company","team","role","will","including","working","ability","experience","strong","excellent","responsibilities","requirements","qualifications","preferred","required","opportunity","looking","candidate","apply","description","information","equal","employment"]);
    generic.forEach(g=>jobKeywords.delete(g));
    
    // Match against resume
    const matched=[];const missing=[];
    jobKeywords.forEach(kw=>{
      if(resumeN.includes(kw))matched.push(kw);
      else missing.push(kw);
    });
    // Sort by relevance (longer phrases first, they're more specific)
    matched.sort((a,b)=>b.length-a.length);
    missing.sort((a,b)=>b.length-a.length);
    // Deduplicate (remove substrings of longer matches)
    const dedup=(arr)=>{const result=[];arr.forEach(item=>{if(!result.some(r=>r!==item&&r.includes(item)))result.push(item)});return result};
    const mFinal=dedup(matched).slice(0,30);
    const miFinal=dedup(missing).slice(0,25);
    // Score: weighted — matched keywords matter more if they're longer/more specific
    const totalWeight=mFinal.length+miFinal.length;
    const matchWeight=mFinal.reduce((s,k)=>s+(k.split(" ").length>1?1.5:1),0);
    const totalW=matchWeight+miFinal.reduce((s,k)=>s+(k.split(" ").length>1?1.5:1),0);
    const rawScore=totalW>0?Math.round((matchWeight/totalW)*100):0;
    // Clamp and add baseline (resume has some inherent value)
    const score=Math.min(99,Math.max(15,Math.round(rawScore*0.85+15)));
    return{score,matched:mFinal,missing:miFinal,total:mFinal.length+miFinal.length};
  }

  // Client-side resume parser — no API call needed
  function parseSource(text){
    const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
    const result={name:"",email:"",phone:"",location:"",linkedin:"",companies:[],education:[],allText:text};
    // Name: usually first non-empty line or line with all caps
    for(const l of lines){const clean=l.replace(/\*\*/g,"").replace(/[#*_]/g,"").trim();if(clean&&/^[A-Z][a-z]+ [A-Z]/.test(clean)&&clean.split(" ").length<=4&&!clean.includes("@")){result.name=clean;break}}
    // Contact info
    const emailM=text.match(/[\w.+-]+@[\w.-]+\.\w+/);if(emailM)result.email=emailM[0];
    const phoneM=text.match(/\d{3}[-.]?\d{3}[-.]?\d{4}/);if(phoneM)result.phone=phoneM[0];
    const locM=text.match(/([A-Z][a-z]+(?:\s[A-Z][a-z]+)*),\s*([A-Z]{2})\b/);if(locM)result.location=locM[0];
    const liM=text.match(/linkedin\.com\/in\/[\w-]+/);if(liM)result.linkedin=liM[0];
    // Companies: look for patterns like **COMPANY** | City or COMPANY | City or bold company names followed by titles
    const companyPatterns=[
      /\*\*([A-Z][A-Z\s&.,/]+(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)\*\*\s*[|\\\u2013–-]\s*(.+)/gi,
      /\b([A-Z][A-Z\s&.,/]{3,}(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)\s*[|\\\u2013–-]\s*([A-Za-z\s,]+)/g,
      /(?:^|\n)\s*(?:\*\*)?([A-Z][A-Z\s&.,/]+(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)(?:\*\*)?\s*$/gm
    ];
    const foundCompanies=new Set();
    for(const pat of companyPatterns){let m;while((m=pat.exec(text))!==null){const name=m[1].replace(/\*\*/g,"").trim();if(name.length>2&&name.length<60&&!/^(CORE|PROFESSIONAL|EXECUTIVE|EDUCATION|REVENUE|SALES|EARLY|TOOLS|KEY)/i.test(name))foundCompanies.add(name)}}
    // Titles: look for patterns like **Title** Year – Year or *Title* Year
    const titlePat=/\*\*([^*]{5,80})\*\*\s*((?:19|20)\d{2})\s*[–\-\u2013]\s*((?:19|20)\d{2}|Present)/gi;
    let tm;const roles=[];
    while((tm=titlePat.exec(text))!==null){roles.push({title:tm[1].trim(),startDate:tm[2],endDate:tm[3]})}
    // Match roles to companies
    const companyArr=Array.from(foundCompanies);
    for(const role of roles){
      // Find nearest company above this role in the text
      const roleIdx=text.indexOf(role.title);
      let bestCompany="";let bestDist=Infinity;
      for(const c of companyArr){const ci=text.indexOf(c);if(ci>=0&&ci<roleIdx&&(roleIdx-ci)<bestDist){bestDist=roleIdx-ci;bestCompany=c}}
      // Collect bullets after this role
      const roleLineIdx=text.indexOf(role.title);
      const afterRole=text.slice(roleLineIdx);
      const bulletMatches=afterRole.match(/[-•◆\*]\s+.{10,}/g)||[];
      const bullets=bulletMatches.slice(0,15).map(b=>b.replace(/^[-•◆\*]\s+/,"").replace(/\*\*/g,"").trim());
      result.companies.push({company:bestCompany||"Unknown",title:role.title,dates:role.startDate+" – "+role.endDate,bullets:bullets});
    }
    // If no roles found via pattern, try simpler extraction
    if(!result.companies.length&&companyArr.length){companyArr.forEach(c=>result.companies.push({company:c,title:"",dates:"",bullets:[]}))}
    // Education
    const eduPats=[/M\.?B\.?A\.?[,\s]+([^\n|]+)/gi,/M\.?A\.?[,\s]+([^\n|]+)/gi,/B\.?S\.?[,\s]+([^\n|]+)/gi,/Master[s']?\s+(?:of\s+)?([^\n|]+)/gi,/Bachelor[s']?\s+(?:of\s+)?([^\n|]+)/gi];
    for(const ep of eduPats){let em;while((em=ep.exec(text))!==null){result.education.push(em[0].replace(/\*\*/g,"").trim())}}
    return result;
  }

dent prose. Not a list of buzzwords. Should read like a human executive wrote it. Reference specific real achievements (e.g., '$0 to $10M ARR') and position the candidate for the target role. End with something about their education or analytical background if relevant.\n\n## Core Competencies\nThree rows of 3 competencies each, separated by bullets (•), with a line break between rows. Choose competencies that mirror the job posting language where the candidate genuinely has the experience.\n\n## Professional Experience\n\n**COMPANY NAME** | City, ST\n*One-line company description tailored to what's relevant for the target role*\n\n**Job Title** Year – Year\n\nThen organized into bold-italic sub-section headers (e.g., ***Sales Team Leadership & Coaching***) followed by bullets. Sub-sections should be themed around the target job's key requirements.\n\nBullets should:\n- Start with strong action verbs\n- Include specific real metrics from the source\n- Be 1-2 lines each\n- Sound like a confident human wrote them, not an AI\n- Avoid generic filler like 'leveraged synergies' or 'drove strategic initiatives'\n\n## Education\n**Degree** | School | Honors — COPY EXACTLY FROM SOURCE, do not rephrase\n\n## [Role-Specific] Expertise\nA section at the bottom with 3-4 bold category labels (e.g., **Leadership:**, **Sales Methodology:**, **Operations:**, **Tools:**) each followed by a comma-separated list of relevant skills.\n```\n\nIMPORTANT STYLE NOTES:\n- The title line under the name (*italic*) should match the TARGET JOB TITLE, not the candidate's current title\n- Company descriptions should be reframed for relevance to the target role\n- Sub-section headers within each role should be themed around the target job's requirements\n- Write like a sharp human executive, not an AI. No buzzword soup. Be specific and direct.\n- Avoid words like: leverage, utilize, spearhead, synergy, cutting-edge, innovative, dynamic\n\nOutput ONLY the resume in markdown. No commentary before or after.";

    const msg2="=== CANDIDATE'S FULL SOURCE TEXT ===\n"+allSource+"\n\n=== LOCKED DATA (copy exactly, never alter) ===\nCompanies: "+companyList+"\nEducation: "+eduList+"\nName: "+(extracted.name||"see source")+"\nEmail: "+(extracted.email||"see source")+"\nPhone: "+(extracted.phone||"see source")+"\nLocation: "+(extracted.location||"see source")+"\n\n=== TARGET JOB POSTING ===\n"+job+"\n\n=== INSTRUCTION ===\nWrite a polished, professional resume using ONLY the candidate's real data.\n\nCRITICAL: Education, company names, dates, dollar amounts, percentages, and metrics must be copied EXACTLY from the source. Do not rephrase degrees or school names.\n\nKey requirements:\n1. The italic title line under the name should match the TARGET job title from the posting\n2. Executive Summary should be confident prose referencing specific real achievements\n3. Organize bullets under bold-italic sub-section headers themed around the target role\n4. Include a role-specific expertise section at the bottom\n5. Education section: copy degree names, school names, and honors VERBATIM from source\n6. Write like a human. Be direct and specific. No AI filler language.";

<p>An ATS score of 80 or above is considered strong and means your resume is likely to pass most applicant tracking system filters. Scores between 60-79 indicate decent compatibility with room for improvement. Below 60 means significant keyword gaps that could cause your resume to be filtered out before a human recruiter ever reads it.</p>
