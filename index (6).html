function extractText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res({name:file.name,content:ev.target.result,type:file.type});r.onerror=()=>rej();r.readAsText(file)})}
function extractPDF(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{try{const b=ev.target.result.split(",")[1];res({name:file.name,content:"[PDF: "+file.name+"]",rawBase64:b,type:"application/pdf"})}catch(x){res({name:file.name,content:"[PDF: "+file.name+"]",type:"application/pdf"})}};r.onerror=()=>rej();r.readAsDataURL(file)})}
function extractDocx(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{mammoth.extractRawText({arrayBuffer:ev.target.result}).then(result=>{res({name:file.name,content:result.value,type:file.type})}).catch(()=>rej(new Error("DOCX parse failed")))};r.onerror=()=>rej();r.readAsArrayBuffer(file)})}
function isDocx(file){return file.name.toLowerCase().endsWith(".docx")||file.type==="application/vnd.openxmlformats-officedocument.wordprocessingml.document"}

// --- Resume Style Renderers (return HTML strings for export) ---
function parseResume(text){
  const sections=[];let current=null;
  text.split("\n").forEach(l=>{
    if(l.startsWith("# ")){sections.push({type:"name",text:l.slice(2)});current=null}
    else if(l.startsWith("## ")){current={type:"section",title:l.slice(3),items:[]};sections.push(current)}
    else if(l.startsWith("### ")){if(current)current.items.push({type:"subtitle",text:l.slice(4)});else sections.push({type:"subtitle",text:l.slice(4)})}
    else if(l.startsWith("- ")||l.startsWith("* ")){if(current)current.items.push({type:"bullet",text:l.slice(2)});else sections.push({type:"bullet",text:l.slice(2)})}
    else if(l.startsWith("**")&&l.endsWith("**")){if(current)current.items.push({type:"bold",text:l.replace(/\*\*/g,"")});else sections.push({type:"bold",text:l.replace(/\*\*/g,"")})}
    else if(l.trim()){if(current)current.items.push({type:"text",text:l.replace(/\*\*/g,"")});else sections.push({type:"text",text:l.replace(/\*\*/g,"")})}
  });
  return sections;
}

function classicHTML(text){
  const s=parseResume(text);
  let h='<div style="font-family:Georgia,\'Times New Roman\',serif;color:#1a1a1a;max-width:700px;margin:0 auto;padding:40px;line-height:1.5">';
  s.forEach(item=>{
    if(item.type==="name")h+='<h1 style="font-size:28px;font-weight:700;text-align:center;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:6px;letter-spacing:1px">'+item.text+'</h1>';
    else if(item.type==="section"){
      h+='<h2 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid #999;padding-bottom:4px;margin:20px 0 10px;color:#333">'+item.title+'</h2>';
      item.items.forEach(it=>{
        if(it.type==="subtitle")h+='<h3 style="font-size:15px;font-weight:700;margin:12px 0 3px;color:#1a1a1a">'+it.text+'</h3>';
        else if(it.type==="bullet")h+='<div style="display:flex;gap:8px;margin:3px 0 3px 8px"><span style="color:#666;flex-shrink:0">•</span><span style="font-size:13.5px;color:#333">'+it.text+'</span></div>';
        else if(it.type==="bold")h+='<p style="font-size:14px;font-weight:700;margin:8px 0 2px;color:#1a1a1a">'+it.text+'</p>';
        else h+='<p style="font-size:13.5px;color:#333;margin:2px 0">'+it.text+'</p>';
      });
    }
    else if(item.type==="text")h+='<p style="font-size:13.5px;color:#333;margin:3px 0;text-align:center">'+item.text+'</p>';
    else if(item.type==="bullet")h+='<div style="display:flex;gap:8px;margin:3px 0"><span style="color:#666">•</span><span style="font-size:13.5px;color:#333">'+item.text+'</span></div>';
  });
  h+='</div>';return h;
}

    else if(item.type==="text")h+='<p style="font-size:13.5px;color:#2d2d2d;margin:3px 0;text-align:center">'+item.text+'</p>';

  h+='</div>';return h;

// --- React preview renderers (for in-app display on dark background) ---
function ri(text){
  return text.split(/(\*\*[^*]+\*\*)/g).map((p,i)=>
    p.startsWith("**")&&p.endsWith("**")?el("strong",{key:i,style:{fontWeight:600,color:"#1a1a1a"}},p.slice(2,-2)):p
  );
}

function previewClassic(text){
  return text.split("\n").map((l,i)=>{
    if(l.startsWith("# "))return el("h1",{key:i,style:{fontSize:22,fontWeight:700,textAlign:"center",borderBottom:"2px solid #333",paddingBottom:8,marginBottom:6,letterSpacing:1,color:"#1a1a1a",fontFamily:"Georgia,serif"}},l.slice(2));
    if(l.startsWith("## "))return el("h2",{key:i,style:{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid #999",paddingBottom:3,margin:"16px 0 8px",color:"#333",fontFamily:"Georgia,serif"}},l.slice(3));
    if(l.startsWith("### "))return el("h3",{key:i,style:{fontSize:14,fontWeight:700,margin:"10px 0 3px",color:"#1a1a1a",fontFamily:"Georgia,serif"}},l.slice(4));
    if(l.startsWith("- ")||l.startsWith("* "))return el("div",{key:i,style:{display:"flex",gap:8,margin:"2px 0 2px 8px"}},el("span",{style:{color:"#666"}},"•"),el("span",{style:{fontSize:13,color:"#333",lineHeight:1.5,fontFamily:"Georgia,serif"}},ri(l.slice(2))));
    if(l.trim()==="")return el("div",{key:i,style:{height:4}});
    return el("p",{key:i,style:{fontSize:13,color:"#333",margin:"2px 0",lineHeight:1.5,fontFamily:"Georgia,serif"}},ri(l));
  });
}

function downloadAsWord(html,filename){
  const full='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{margin:0.75in}</style></head><body>'+WATERMARK_TOP+html+WATERMARK_BOTTOM+'</body></html>';
  const blob=new Blob([full],{type:"application/msword"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename+".doc";a.click();
  URL.revokeObjectURL(url);
}

function downloadAsPDF(html,filename){
  const win=window.open("","_blank","width=800,height=1000");
  win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+filename+'</title><style>@page{margin:0.6in}body{margin:0;padding:40px}a{color:#7c3aed;text-decoration:none}</style></head><body>'+WATERMARK_TOP+html+WATERMARK_BOTTOM+'</body></html>');
  win.document.close();
  setTimeout(()=>{win.print()},500);
}

const IS={width:"100%",fontSize:13,background:"rgba(30,41,59,.5)",border:"1px solid rgba(100,116,139,.25)",borderRadius:8,color:"#cbd5e1",padding:14,resize:"vertical",lineHeight:1.6,fontFamily:"inherit"};
const mono="monospace";

function App(){
  const[step,setStep]=useState(1);
  const[kb,setKb]=useState([]);
  const[li,setLi]=useState("");
  const[extra,setExtra]=useState("");
  const[job,setJob]=useState("");
  const[resume,setResume]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[prog,setProg]=useState("");
  const[dare,setDare]=useState(2);
  const[style,setStyle]=useState("modern");
  const[editPrompt,setEditPrompt]=useState("");
  const[editing,setEditing]=useState(false);
  const[dragging,setDragging]=useState(false);
  const[isPaid,setIsPaid]=useState(()=>{try{const p=localStorage.getItem("rw-paid");if(p){const d=JSON.parse(p);if(d.expires>Date.now())return true}return false}catch(e){return false}});
  const[showUpgrade,setShowUpgrade]=useState(false);
  const[checkoutLoading,setCheckoutLoading]=useState("");

  // Check URL for payment success
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get("paid")==="true"){
      const expires=Date.now()+(30*24*60*60*1000); // 30 days
      try{localStorage.setItem("rw-paid",JSON.stringify({expires}))}catch(e){}
      setIsPaid(true);
      // Restore resume state saved before checkout
      try{
        const saved=localStorage.getItem("rw-state");
        if(saved){
          const s=JSON.parse(saved);
          if(s.resume){setResume(s.resume);setStep(3)}
          if(s.style)setStyle(s.style);
          localStorage.removeItem("rw-state");
        }
      }catch(e){}
      window.history.replaceState({},"",window.location.pathname);
    }
    if(params.get("canceled")==="true"){
      // Restore state on cancel too so they don't lose their resume
      try{
        const saved=localStorage.getItem("rw-state");
        if(saved){
          const s=JSON.parse(saved);
          if(s.resume){setResume(s.resume);setStep(3)}
          if(s.style)setStyle(s.style);
          localStorage.removeItem("rw-state");
        }
      }catch(e){}
      window.history.replaceState({},"",window.location.pathname);
    }
  },[]);
  const fRef=useRef(null);

  const FINGERPRINT="<!-- RESUME-WEAPON-GENERATED -->";
  const AI_PATTERNS=[
    "RESUME-WEAPON-GENERATED","RESUME WEAPON v1","WEAPON DEPLOYED","DEPLOY WEAPON",
    "[Contact Information]","[Dates from source","[Degree Information]","[University Name]",
    "[Location]","[Date Range]","Dates from source material","[Your ","[Insert "
  ];

  // API helper — calls serverless function (key injected server-side)
  const callClaude=useCallback(async(system,messages,maxTokens)=>{
    const r=await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens||4000,system:system,messages:messages})
    });
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error?.message||d.error||"API error "+r.status)}
    return r.json();
  },[]);

  const processFiles=useCallback(async(files)=>{
    const out=[];const rejected=[];
    for(const f of files){
      try{
        const parsed=f.type==="application/pdf"?await extractPDF(f):isDocx(f)?await extractDocx(f):await extractText(f);
        const txt=(parsed.content||"").toLowerCase();
        const isAI=AI_PATTERNS.some(p=>txt.includes(p.toLowerCase()));
        if(isAI){rejected.push(f.name)}else{out.push(parsed)}
      }catch(x){}
    }
    if(rejected.length){setErr("⚠ Blocked "+rejected.join(", ")+" — that looks like a previously generated or AI-created resume. Upload only your original resumes.");setTimeout(()=>setErr(""),8000)}
    if(out.length)setKb(p=>[...p,...out]);
  },[]);

  const upload=useCallback(async(ev)=>{
    await processFiles(Array.from(ev.target.files));
    ev.target.value="";
  },[processFiles]);

  const handleDrop=useCallback(async(ev)=>{
    ev.preventDefault();ev.stopPropagation();setDragging(false);
    const files=Array.from(ev.dataTransfer.files);
    if(files.length)await processFiles(files);
  },[processFiles]);

  const handleDragOver=useCallback((ev)=>{ev.preventDefault();ev.stopPropagation();setDragging(true)},[]);
  const handleDragLeave=useCallback((ev)=>{ev.preventDefault();ev.stopPropagation();setDragging(false)},[]);

  const DLC={
    1:{label:"SAFE",color:"#22c55e",desc:"Strictly factual, no reframing"},
    2:{label:"BOLD",color:"#f59e0b",desc:"Confident framing, credible connections"},
    3:{label:"AUDACIOUS",color:"#ef4444",desc:"Strongest truthful case possible"}
  };

  const STYLES={
    classic:{label:"CLASSIC",icon:"📜",desc:"Traditional serif, timeless authority",color:"#94a3b8",border:"rgba(148,163,184,.3)"},
    modern:{label:"MODERN",icon:"⚡",desc:"Clean sans-serif, sharp & contemporary",color:"#38bdf8",border:"rgba(56,189,248,.3)"},
    executive:{label:"EXECUTIVE",icon:"👔",desc:"Premium serif, gold accents, C-suite energy",color:"#d4a535",border:"rgba(212,165,53,.3)"}
  };

  // Client-side resume parser — no API call needed
  function parseSource(text){
    const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
    const result={name:"",email:"",phone:"",location:"",linkedin:"",companies:[],education:[],allText:text};
    // Name: usually first non-empty line or line with all caps
    for(const l of lines){const clean=l.replace(/\*\*/g,"").replace(/[#*_]/g,"").trim();if(clean&&/^[A-Z][a-z]+ [A-Z]/.test(clean)&&clean.split(" ").length<=4&&!clean.includes("@")){result.name=clean;break}}
    // Contact info
    const emailM=text.match(/[\w.+-]+@[\w.-]+\.\w+/);if(emailM)result.email=emailM[0];
    const phoneM=text.match(/\d{3}[-.]?\d{3}[-.]?\d{4}/);if(phoneM)result.phone=phoneM[0];
    const locM=text.match(/([A-Z][a-z]+(?:\s[A-Z][a-z]+)*),\s*([A-Z]{2})\b/);if(locM)result.location=locM[0];
    const liM=text.match(/linkedin\.com\/in\/[\w-]+/);if(liM)result.linkedin=liM[0];
    // Companies: look for patterns like **COMPANY** | City or COMPANY | City or bold company names followed by titles
    const companyPatterns=[
      /\*\*([A-Z][A-Z\s&.,/]+(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)\*\*\s*[|\\\u2013–-]\s*(.+)/gi,
      /\b([A-Z][A-Z\s&.,/]{3,}(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)\s*[|\\\u2013–-]\s*([A-Za-z\s,]+)/g,
      /(?:^|\n)\s*(?:\*\*)?([A-Z][A-Z\s&.,/]+(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)(?:\*\*)?\s*$/gm
