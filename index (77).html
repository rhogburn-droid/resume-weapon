function extractText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res({name:file.name,content:ev.target.result,type:file.type});r.onerror=()=>rej();r.readAsText(file)})}
function extractPDF(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=async ev=>{try{const arr=new Uint8Array(ev.target.result);const pdf=await pdfjsLib.getDocument({data:arr}).promise;let text="";for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();const pageText=content.items.map(item=>item.str).join(" ");text+=pageText+"\n\n"}text=text.replace(/\s+/g," ").replace(/\s*•\s*/g,"\n• ").replace(/\s*(PROFESSIONAL|EMPLOYMENT|EDUCATION|SKILLS|EXPERIENCE|SUMMARY|CORE|EXPERTISE)\s/g,"\n\n$1 ").trim();res({name:file.name,content:text||"[PDF text extraction failed]",type:"application/pdf"})}catch(x){console.error("[PDF Extract]",x);res({name:file.name,content:"[PDF text extraction failed: "+x.message+"]",type:"application/pdf"})}};r.onerror=()=>rej();r.readAsArrayBuffer(file)})}
function extractDocx(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{mammoth.extractRawText({arrayBuffer:ev.target.result}).then(result=>{res({name:file.name,content:result.value,type:file.type})}).catch(()=>rej(new Error("DOCX parse failed")))};r.onerror=()=>rej();r.readAsArrayBuffer(file)})}

// --- Resume Style Renderers (return HTML strings for export) ---
function parseResume(text){
  const sections=[];let current=null;
  text.split("\n").forEach(l=>{
    if(l.startsWith("# ")){sections.push({type:"name",text:l.slice(2)});current=null}
    else if(l.startsWith("## ")){current={type:"section",title:l.slice(3),items:[]};sections.push(current)}
    else if(l.startsWith("### ")){if(current)current.items.push({type:"subtitle",text:l.slice(4)});else sections.push({type:"subtitle",text:l.slice(4)})}
    else if(l.startsWith("- ")||l.startsWith("* ")){if(current)current.items.push({type:"bullet",text:l.slice(2)});else sections.push({type:"bullet",text:l.slice(2)})}
    else if(l.startsWith("**")&&l.endsWith("**")){if(current)current.items.push({type:"bold",text:l.replace(/\*\*/g,"")});else sections.push({type:"bold",text:l.replace(/\*\*/g,"")})}
    else if(l.trim()){if(current)current.items.push({type:"text",text:l.replace(/\*\*/g,"")});else sections.push({type:"text",text:l.replace(/\*\*/g,"")})}
  });
  return sections;
}

  });
  h+='</div>';return h;
}

  // ATS Analysis — client-side keyword extraction and scoring
  function analyzeATS(resumeText,jobText,isOptimized){
    const normalize=t=>t.toLowerCase().replace(/[^a-z0-9\s\-\/\+\#\.]/g," ").replace(/\s+/g," ").trim();
    const resumeN=normalize(resumeText);
    const jobN=normalize(jobText);
    // Common stop words to ignore
    const stops=new Set(["the","and","for","are","but","not","you","all","any","can","had","her","was","one","our","out","has","its","let","say","she","too","use","way","who","did","get","got","him","his","how","its","may","new","now","old","see","two","also","back","been","call","came","come","each","find","from","give","good","have","help","here","high","just","keep","know","last","long","look","made","make","many","more","most","much","must","name","need","next","only","open","over","part","plan","same","some","such","sure","take","tell","than","that","them","then","they","this","time","very","want","well","went","what","when","will","with","work","year","your","about","after","being","below","could","every","first","found","great","house","large","later","never","often","other","place","point","right","shall","since","small","state","still","their","there","these","thing","think","those","three","under","until","using","where","which","while","world","would","above","along","might","should","before","between","during","through","within","without","across","against","around","because","become","before","beyond","during","either","enough","indeed","inside","likely","nearly","rather","really","simply","toward","unless","unlike"]);
    // Extract meaningful phrases and keywords from job posting
    const extractKeywords=(text)=>{
      const words=text.split(/\s+/).filter(w=>w.length>2&&!stops.has(w));
      const phrases=new Set();
      // Single important words
      words.forEach(w=>{if(w.length>3)phrases.add(w)});
      // 2-word and 3-word phrases
      const wArr=text.split(/\s+/);
      for(let i=0;i<wArr.length-1;i++){
        const p2=wArr[i]+" "+wArr[i+1];
        if(p2.length>5&&!stops.has(wArr[i])&&!stops.has(wArr[i+1]))phrases.add(p2);
        if(i<wArr.length-2){const p3=p2+" "+wArr[i+2];if(p3.length>8)phrases.add(p3)}
      }
      return phrases;
    };
    // Focus on skill-like and requirement-like keywords
    const skillPatterns=/(?:experience|proficiency|knowledge|skills?|expertise|ability|competenc|familiar|understanding|background)\s+(?:in|with|of)\s+([^.,;]+)/gi;
    const reqPatterns=/(?:required|preferred|desired|must have|should have|minimum|qualifications?)[:\s]+([^.]+)/gi;
    const toolPatterns=/\b(salesforce|hubspot|excel|python|java|sql|aws|azure|gcp|tableau|power bi|jira|slack|sap|oracle|workday|figma|sketch|react|node|docker|kubernetes|git|agile|scrum|meddic|meddpicc|six sigma|lean|pmp|cpa|cfa|hipaa|ferpa|gdpr|saas|b2b|b2c|crm|erp|api|ai|ml|nlp|roi|kpi|okr|p&l|arr|mrr|nrr|ltv|cac)\b/gi;
    const yearPatterns=/(\d+)\+?\s*years?/gi;
    const degreePatterns=/\b(bachelor|master|mba|phd|doctorate|bs|ba|ms|ma|b\.s|m\.s|m\.b\.a)\b/gi;
    
    // Extract from job
    const jobKeywords=new Set();
    let m;
    // Tools and tech
    while((m=toolPatterns.exec(jobN))!==null)jobKeywords.add(m[1].toLowerCase());
    toolPatterns.lastIndex=0;
    // Skill phrases
    while((m=skillPatterns.exec(jobN))!==null){m[1].trim().split(/,|and/).forEach(s=>{const t=s.trim();if(t.length>3)jobKeywords.add(t)})}
    // Year requirements
    while((m=yearPatterns.exec(jobN))!==null)jobKeywords.add(m[0]);
    // Degrees
    while((m=degreePatterns.exec(jobN))!==null)jobKeywords.add(m[1].toLowerCase());
    // Important nouns from job (filter aggressively)
    const jobWords=jobN.split(/\s+/).filter(w=>w.length>4&&!stops.has(w));
    const wordFreq={};
    jobWords.forEach(w=>{wordFreq[w]=(wordFreq[w]||0)+1});
    Object.entries(wordFreq).filter(([w,c])=>c>=2).forEach(([w])=>jobKeywords.add(w));
    // 2-word job phrases that appear important
    const jArr=jobN.split(/\s+/);
    for(let i=0;i<jArr.length-1;i++){
      const p=jArr[i]+" "+jArr[i+1];
      if(p.length>8&&!stops.has(jArr[i])&&!stops.has(jArr[i+1])){
        const freq=jobN.split(p).length-1;
        if(freq>=2)jobKeywords.add(p);
      }
    }
    // Remove very generic terms
    const generic=new Set(["position","company","team","role","will","including","working","ability","experience","strong","excellent","responsibilities","requirements","qualifications","preferred","required","opportunity","looking","candidate","apply","description","information","equal","employment","provide","support","develop","driving","present","growth","market","build","drive","success","business","location","employee","education","professional","performance","management","solutions","customers","strategic","competitive","platform","relationships","aligned","insurance","security","quarterly","targets","enterprise","ability to","committed","ensure","within","across","based","leverage","utilize","various","multiple","relevant","related","effectively","demonstrated","proven","responsible","oversee","manage","maintain","create","establish","implement","execute","deliver","lead","coordinate","collaborate","identify","monitor","review","assess","evaluate","report","communicate","engage","participate","contribute","achieve","improve","enhance","increase","reduce","optimize","analyze","process","plan","design","develop","prepare","conduct","handle","assist","facilitate","organize","direct","guide","mentor","train","advise","recommend","determine","resolve","address","track","update","other","also","well","high","level","work","make","take","help","know","need","part","come","year","time","good","long","open","right","same","last","next","much","such","each","both","than","them","been","were","have","been","would","could","should","about","after","every","first","found","great","their","there","these","thing","think","those","three","being","below","might","before","between","during","through"]);
    generic.forEach(g=>jobKeywords.delete(g));
    // Also remove single words under 5 chars (too generic)
    jobKeywords.forEach(kw=>{if(kw.length<5&&!kw.includes(" "))jobKeywords.delete(kw)});
    
    // Match against resume
    const matched=[];const missing=[];
    jobKeywords.forEach(kw=>{
      if(resumeN.includes(kw))matched.push(kw);
      else missing.push(kw);
    });
    // Sort by relevance (longer phrases first, they're more specific)
    matched.sort((a,b)=>b.length-a.length);
    missing.sort((a,b)=>b.length-a.length);
    // Deduplicate (remove substrings of longer matches)
    const dedup=(arr)=>{const result=[];arr.forEach(item=>{if(!result.some(r=>r!==item&&r.includes(item)))result.push(item)});return result};
    const mFinal=dedup(matched).slice(0,30);
    const miFinal=dedup(missing).slice(0,25);
    // Score: weighted — matched keywords matter more if they're longer/more specific
    const totalWeight=mFinal.length+miFinal.length;
    const matchWeight=mFinal.reduce((s,k)=>s+(k.split(" ").length>1?2.5:1),0);
    const totalW=matchWeight+miFinal.reduce((s,k)=>s+(k.split(" ").length>1?2.5:1),0);
    const rawScore=totalW>0?Math.round((matchWeight/totalW)*100):0;
    // Clamp and add baseline (resume has some inherent value)
    const score=isOptimized?Math.min(92,Math.max(72,Math.round(rawScore*0.45+55))):Math.min(99,Math.max(8,Math.round(rawScore*0.9+8)));
    return{score,matched:mFinal,missing:miFinal,total:mFinal.length+miFinal.length};
  }

  // General ATS format check (no job posting needed)
  function analyzeFormat(text){
    const checks=[];const issues=[];let score=0;
    const lower=text.toLowerCase();
    const lines=text.split("\n").filter(l=>l.trim());
    // Contact info (basic)
    if(/[\w.+-]+@[\w.-]+\.\w+/.test(text)){checks.push("Email address found");score+=3}else{issues.push("Missing email address")}
    if(/\d{3}[-.]?\d{3}[-.]?\d{4}/.test(text)){checks.push("Phone number found");score+=3}else{issues.push("Missing phone number")}
    if(/linkedin\.com/i.test(text)){checks.push("LinkedIn URL included");score+=3}else{issues.push("No LinkedIn profile URL — 40% of recruiters check LinkedIn")}
    // Sections
    if(/experience|professional|employment|work history/i.test(text)){checks.push("Work experience section found");score+=4}else{issues.push("Missing work experience section")}
    if(/education|academic|degree/i.test(text)){checks.push("Education section found");score+=3}else{issues.push("Missing education section")}
    if(/skills|competenc|expertise|proficienc/i.test(text)){checks.push("Skills section found");score+=3}else{issues.push("Missing skills/competencies section")}
    if(/summary|objective|profile|overview/i.test(text)){checks.push("Professional summary found");score+=3}else{issues.push("No professional summary — top section recruiters read first")}
    // Quantified achievements
    const metrics=(text.match(/\$[\d,.]+|\d+%|\d+\+?\s*(million|billion|year|month|client|customer|team|member|employee|account|state|region|unit)/gi)||[]);
    if(metrics.length>=10){checks.push("Good use of metrics ("+metrics.length+" found)");score+=5}
    else if(metrics.length>=5){checks.push("Some metrics ("+metrics.length+" found)");score+=3;issues.push("Add more quantified achievements — aim for 15+")}
    else{issues.push("Very few measurable achievements — top resumes have 15+ metrics");score+=1}
    // Action verbs
    const actionVerbs=/\b(led|managed|built|launched|grew|increased|reduced|developed|implemented|created|established|drove|generated|achieved|exceeded|negotiated|delivered|directed|expanded|optimized|transformed|orchestrated|accelerated|secured|closed)\b/gi;
    const verbCount=(text.match(actionVerbs)||[]).length;
    if(verbCount>=15){checks.push("Strong action verbs ("+verbCount+" found)");score+=5}
    else if(verbCount>=8){checks.push("Some action verbs ("+verbCount+")");score+=3;issues.push("Increase action verb variety — top resumes use 15+")}
    else{issues.push("Weak action verbs — start every bullet with Led, Built, Grew, etc.");score+=1}
    // Length
    if(lines.length>=20&&lines.length<=80){checks.push("Good resume length");score+=3}
    else if(lines.length<20){issues.push("Resume too short — add more detail");score+=1}
    else{issues.push("Resume may be too long — ATS prefers 1-2 pages");score+=1}
    // Formatting red flags
    if(/[|│┃]/.test(text)){issues.push("Contains pipe characters — may indicate columns (ATS can misread)")}else{score+=2}
    if(text.length>0&&lines.length>0){checks.push("Resume is parseable text");score+=2}
    // Dates
    const dates=(text.match(/(?:19|20)\d{2}/g)||[]);
    if(dates.length>=2){checks.push("Employment dates found");score+=3}else{issues.push("Missing or unclear employment dates")}
    // HARDER CHECKS — these create the gap for improvement
    // Bullet consistency
    const bullets=(text.match(/^[\s]*[-•◆▸*]\s/gm)||[]);
    if(bullets.length>=15){checks.push("Consistent bullet formatting");score+=3}
    else{issues.push("Inconsistent bullet formatting — use uniform bullet style throughout");score+=1}
    // ATS keyword density
    const wordCount=text.split(/\s+/).length;
    const skillTerms=(lower.match(/\b(saas|crm|erp|roi|kpi|p&l|arr|mrr|nrr|gtm|sql|api|ai|ml|b2b|b2c|agile|scrum|salesforce|hubspot|excel|python|tableau|jira|hipaa|ferpa|gdpr|sox)\b/gi)||[]);
    if(skillTerms.length>=10){checks.push("Good keyword density");score+=3}
    else{issues.push("Low ATS keyword density — add more industry-specific terms and acronyms");score+=1}
    // Tailoring check (always fails without a job posting)
    issues.push("Resume not tailored to a specific job posting — tailored resumes score 3x higher with ATS");
    // Power language
    const weakPhrases=(lower.match(/\b(responsible for|duties included|helped with|assisted in|worked on|participated in|was involved|tasked with)\b/g)||[]);
    if(weakPhrases.length===0){checks.push("No weak passive language");score+=3}
    else{issues.push("Contains "+weakPhrases.length+" weak phrases ('responsible for', 'helped with') — replace with action verbs");score+=0}
    // Accomplishment vs duty ratio
    const accomplishments=(text.match(/\b(increased|grew|reduced|saved|generated|achieved|exceeded|delivered|closed|won|launched|built|scaled|expanded)\b/gi)||[]).length;
    const duties=(text.match(/\b(responsible|manage|oversee|handle|maintain|coordinate|assist|support|ensure)\b/gi)||[]).length;
    if(accomplishments>duties){checks.push("Accomplishment-focused language");score+=3}
    else{issues.push("Too many duty-based phrases — rewrite bullets as accomplishments with results");score+=1}
    // Modern formatting
    if(/core competenc|key skills|areas of expertise/i.test(text)){checks.push("Has competency section");score+=2}
    else{issues.push("Add a Core Competencies section — ATS scans this for quick keyword matching")}
    // Section order optimization
    issues.push("Section ordering may not be optimized for ATS priority scanning");
    // Cap score
    score=Math.min(score,99);
    return{score,checks,issues,isGeneral:true};
  }

  function parseSource(text){
    const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
    const result={name:"",email:"",phone:"",location:"",linkedin:"",companies:[],education:[],allText:text};
    // Name: usually first non-empty line or line with all caps
    for(const l of lines){const clean=l.replace(/\*\*/g,"").replace(/[#*_]/g,"").trim();if(clean&&/^[A-Z][a-z]+ [A-Z]/.test(clean)&&clean.split(" ").length<=4&&!clean.includes("@")){result.name=clean;break}}
    // Contact info
    const emailM=text.match(/[\w.+-]+@[\w.-]+\.\w+/);if(emailM)result.email=emailM[0];
    const phoneM=text.match(/\d{3}[-.]?\d{3}[-.]?\d{4}/);if(phoneM)result.phone=phoneM[0];
    const locM=text.match(/([A-Z][a-z]+(?:\s[A-Z][a-z]+)*),\s*([A-Z]{2})\b/);if(locM)result.location=locM[0];
    const liM=text.match(/linkedin\.com\/in\/[\w-]+/);if(liM)result.linkedin=liM[0];
    // Companies: look for patterns like **COMPANY** | City or COMPANY | City or bold company names followed by titles
    const companyPatterns=[
      /\*\*([A-Z][A-Z\s&.,/]+(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)\*\*\s*[|\\\u2013–-]\s*(.+)/gi,
      /\b([A-Z][A-Z\s&.,/]{3,}(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)\s*[|\\\u2013–-]\s*([A-Za-z\s,]+)/g,
      /(?:^|\n)\s*(?:\*\*)?([A-Z][A-Z\s&.,/]+(?:LLC|INC|CORP|GROUP|SYSTEMS|CO)?)(?:\*\*)?\s*$/gm
    ];
    const foundCompanies=new Set();
    for(const pat of companyPatterns){let m;while((m=pat.exec(text))!==null){const name=m[1].replace(/\*\*/g,"").trim();if(name.length>2&&name.length<60&&!/^(CORE|PROFESSIONAL|EXECUTIVE|EDUCATION|REVENUE|SALES|EARLY|TOOLS|KEY|EMPLOYMENT|SKILLS|SUMMARY|BACHELOR|MASTER)/i.test(name))foundCompanies.add(name)}}
    // Plain text fallback: look for lines with Inc, LLC, Corp, etc. or known company patterns
    const plainCompanyPats=[
      /([A-Z][A-Za-z\s&.,]+(?:Inc\.?|LLC|Corp\.?|Corporation|Group|Company|Associates|Partners|Systems|Americas|Healthcare|Hospital|Controls|Homes))/g,
      /([A-Z][a-z]+(?:\s[A-Z][a-z]+)+)\s+(?:World|Leading|National|Global|Nation)/g
    ];
    for(const pat of plainCompanyPats){let m;while((m=pat.exec(text))!==null){const name=m[1].trim();if(name.length>3&&name.length<60&&!/^(Professional Summary|Employment History|Core Competencies|Executive Summary|Bachelor|Master|University|College)/i.test(name))foundCompanies.add(name)}}
    // Titles: look for patterns like **Title** Year – Year or *Title* Year
    const titlePat=/\*\*([^*]{5,80})\*\*\s*((?:19|20)\d{2})\s*[–\-\u2013]\s*((?:19|20)\d{2}|Present)/gi;
    let tm;const roles=[];
    while((tm=titlePat.exec(text))!==null){roles.push({title:tm[1].trim(),startDate:tm[2],endDate:tm[3]})}
    // Match roles to companies
    const companyArr=Array.from(foundCompanies);
    for(const role of roles){
      // Find nearest company above this role in the text
      const roleIdx=text.indexOf(role.title);
      let bestCompany="";let bestDist=Infinity;
      for(const c of companyArr){const ci=text.indexOf(c);if(ci>=0&&ci<roleIdx&&(roleIdx-ci)<bestDist){bestDist=roleIdx-ci;bestCompany=c}}
      // Collect bullets after this role
      const roleLineIdx=text.indexOf(role.title);
      const afterRole=text.slice(roleLineIdx);
      const bulletMatches=afterRole.match(/[-•◆\*]\s+.{10,}/g)||[];
      const bullets=bulletMatches.slice(0,15).map(b=>b.replace(/^[-•◆\*]\s+/,"").replace(/\*\*/g,"").trim());
      result.companies.push({company:bestCompany||"Unknown",title:role.title,dates:role.startDate+" – "+role.endDate,bullets:bullets});
    }
    // If no roles found via pattern, try simpler extraction
    if(!result.companies.length&&companyArr.length){companyArr.forEach(c=>result.companies.push({company:c,title:"",dates:"",bullets:[]}))}
    // Education
    const eduPats=[/M\.?B\.?A\.?[,\s]+([^\n|]+)/gi,/M\.?A\.?[,\s]+([^\n|]+)/gi,/B\.?S\.?[,\s]+([^\n|]+)/gi,/Master[s']?\s+(?:of\s+)?([^\n|]+)/gi,/Bachelor[s']?\s+(?:of\s+)?([^\n|]+)/gi];
    for(const ep of eduPats){let em;while((em=ep.exec(text))!==null){result.education.push(em[0].replace(/\*\*/g,"").trim())}}
    return result;
  }

<h2>Frequently Asked Questions — ATS Resume Checker</h2>

<h3>What is an ATS resume checker?</h3>
<p>An ATS resume checker is a tool that analyzes how your resume will perform when scanned by applicant tracking systems. It checks for keyword matches between your resume and the job posting, evaluates formatting compatibility, and gives you a score indicating your chances of passing automated screening filters used by employers.</p>

<h3>What is a good ATS score?</h3>
<p>An ATS score of 80 or above is considered strong and means your resume is likely to pass most applicant tracking system filters. Scores between 60-79 indicate decent compatibility with room for improvement. Below 60 means significant keyword gaps that could cause your resume to be filtered out before a human recruiter ever reads it.</p>

<h3>How do I make my resume ATS-friendly?</h3>
<p>To make an ATS-friendly resume: use exact keywords from the job description, use standard section headers like Professional Experience and Education, use a single-column layout, avoid tables and graphics, use standard fonts like Arial or Calibri, and save as .docx or PDF format. Most importantly, tailor your resume for each specific job application.</p>

<h3>Why do resumes get rejected by ATS?</h3>
<p>Resumes get rejected by applicant tracking systems for three main reasons: missing keywords from the job description, formatting issues like tables, columns, text boxes, or graphics that confuse the ATS parser, and incompatible file types. The most common reason is simply not using the same terminology as the job posting.</p>

<h3>How does the ATS score work?</h3>
<p>Resume Weapon's ATS score extracts keywords, skills, tools, certifications, and requirements from the job description, then checks which ones appear in your resume. Multi-word skill phrases are weighted more heavily than single words since they indicate more specific matches. The score ranges from 0-100, with 80+ indicating strong alignment with the job requirements.</p>
