[build]
  publish = "."
  functions = "netlify/functions"
[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Fix mismatched blog slugs — 301 redirect old URLs to actual folders
[[redirects]]
  from = "/blog/why-resume-getting-rejected/*"
  to = "/blog/why-resume-rejected/"
  status = 301

[[redirects]]
  from = "/blog/why-resume-getting-rejected"
  to = "/blog/why-resume-rejected/"
  status = 301

[[redirects]]
  from = "/blog/how-to-get-past-ats-filters/*"
  to = "/blog/how-to-get-past-ats-2026/"
